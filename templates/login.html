<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLB One Subsea - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-box {
            background: #e8e8e8;
            display: inline-flex;
            align-items: center;
            padding: 14px 28px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .logo-box img {
            height: 45px;
            width: auto;
        }

        .login-header h1 {
            font-size: 1.3em;
            color: #0114dc;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            color: #666;
            font-size: 13px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .login-card-header {
            background: #0114dc;
            color: white;
            padding: 18px 28px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .login-card-header svg {
            opacity: 0.9;
        }

        .login-card-body {
            padding: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #0114dc;
            box-shadow: 0 0 0 3px rgba(1, 20, 220, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #0114dc;
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 6px;
        }

        .btn-login:hover {
            background: #0010b0;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .erro-msg {
            background: #fff0f0;
            border: 1.5px solid #ffb3b3;
            color: #c00;
            border-radius: 7px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            text-align: center;
            margin-top: 22px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="logo-box">
                <img src="https://www.onesubsea.slb.com/-/media/onesubseajv/images/logos/jv_mainlogo.svg"
                     alt="SLB One Subsea"
                     onerror="this.style.display='none'; this.parentNode.innerHTML='<strong style=\'color:#0114dc;font-size:18px;\'>SLB OneSubsea</strong>'">
            </div>
            <h1>Sistema de Gestão de Escalas</h1>
            <p>SLB One Subsea &mdash; Acesso Restrito</p>
        </div>

        <div class="login-card">
            <div class="login-card-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Autenticação
            </div>
            <div class="login-card-body">
                {% if erro %}
                <div class="erro-msg">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {{ erro }}
                </div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label for="usuario">Usuário</label>
                        <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário"
                               autocomplete="username" autofocus required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha"
                               autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
            </div>
        </div>

        <p class="footer-text">SLB One Subsea &copy; 2026 &mdash; Uso interno</p>
    </div>
</body>
</html>
